# Nginx config for oop-orchestrator.4cgroup.co.za
# Place at: /etc/nginx/sites-available/oop-orchestrator
# Enable:   ln -s /etc/nginx/sites-available/oop-orchestrator /etc/nginx/sites-enabled/
# Test:     nginx -t
# Reload:   systemctl reload nginx
#
# Cert files (copy from wildcard-4cgroup.pem-v1 bundle):
#   /etc/nginx/ssl/wildcard-4cgroup.crt   ← cert + intermediate chain (PEM)
#   /etc/nginx/ssl/wildcard-4cgroup.key   ← private key (PEM)
#
# mkdir -p /etc/nginx/ssl
# chmod 700 /etc/nginx/ssl
# cp wildcard-4cgroup.pem-v1 /etc/nginx/ssl/wildcard-4cgroup.crt
# cp wildcard-4cgroup.key    /etc/nginx/ssl/wildcard-4cgroup.key
# chmod 600 /etc/nginx/ssl/wildcard-4cgroup.*

server {
    listen 80;
    server_name oop-orchestrator.4cgroup.co.za;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name oop-orchestrator.4cgroup.co.za;

    ssl_certificate     /etc/nginx/ssl/wildcard-4cgroup.crt;
    ssl_certificate_key /etc/nginx/ssl/wildcard-4cgroup.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # WebSocket endpoint — must come before the catch-all location
    location /ws/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;   # keep WS alive for long-running jobs
    }

    # All other traffic (REST API + static frontend)
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Depot tar streams can be 3-4 GB — disable buffering and extend timeouts
        proxy_buffering    off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_max_body_size 0;
    }
}
